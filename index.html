        <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }

        .cdi-filter-panel {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 10px 16px;
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.28);
            display: flex;
            align-items: center;
            gap: 7px;
            flex-wrap: wrap;
            justify-content: center;
            backdrop-filter: blur(6px);
            max-width: 94vw;
            border: 1px solid rgba(0,0,0,0.08);
        }

        .cdi-filter-title {
            font-family: 'Segoe UI', Arial, sans-serif;
            font-weight: 700;
            font-size: 11px;
            color: #555;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            white-space: nowrap;
            margin-right: 2px;
        }

        .cdi-btn {
            border: 2.5px solid transparent;
            border-radius: 10px;
            padding: 6px 11px;
            cursor: pointer;
            font-family: 'Segoe UI', Arial, sans-serif;
            font-weight: 700;
            font-size: 11px;
            line-height: 1.4;
            transition: all 0.18s ease;
            outline: none;
            white-space: nowrap;
            text-align: center;
        }

        .cdi-btn small {
            display: block;
            font-weight: 400;
            font-size: 9.5px;
            opacity: 0.88;
            margin-top: 1px;
        }

        .cdi-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.22);
        }

        .cdi-btn.active {
            border-color: #111 !important;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.32);
            transform: translateY(-2px) scale(1.06);
        }


        .cdi-info-banner {
            position: absolute;
            top: 14px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1001;
            background: rgba(20, 20, 20, 0.82);
            color: #fff;
            border-radius: 10px;
            padding: 9px 18px 9px 14px;
            font-family: 'Segoe UI', Arial, sans-serif;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            display: none;
            pointer-events: none;
            backdrop-filter: blur(5px);
            max-width: 82vw;
            border-left: 5px solid #fff;
            box-shadow: 0 4px 14px rgba(0,0,0,0.25);
        }


        .cdi-divider {
            width: 1px;
            height: 32px;
            background: rgba(0,0,0,0.12);
            margin: 0 2px;
        }

            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;

            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }

                popup._contentNode.classList.remove('media');
            }

        function style_lastyh_1_0(feature) {

		document.addEventListener("DOMContentLoaded", function() {
            function newLayersListHeight() {
                var layerScrollbarElement = document.querySelector('.leaflet-control-layers-scrollbar');
                if (layerScrollbarElement) {
                    var layersListElement = document.querySelector('.leaflet-control-layers-list');
                    var originalHeight = layersListElement.style.height 
                        || window.getComputedStyle(layersListElement).height;
                    var newHeight = parseFloat(originalHeight) - 50;
                    layersListElement.style.height = newHeight + 'px';
                }
            }
            var isLayersListExpanded = true;
            var controlLayersElement = document.querySelector('.leaflet-control-layers');
            var toggleLayerControl = document.querySelector('.leaflet-control-layers-toggle');
            toggleLayerControl.addEventListener('click', function() {
                if (isLayersListExpanded) {
                    controlLayersElement.classList.remove('leaflet-control-layers-expanded');
                } else {
                    controlLayersElement.classList.add('leaflet-control-layers-expanded');
                }
                isLayersListExpanded = !isLayersListExpanded;
                newLayersListHeight()
            });	
			if (controlLayersElement) {
				controlLayersElement.addEventListener('click', function(event) {
					var toggleLayerHeaderPointer = event.target.closest('.leaflet-layerstree-header-pointer span');
					if (toggleLayerHeaderPointer) {
						newLayersListHeight();
					}
				});
			}
            setTimeout(function() { toggleLayerControl.click(); }, 10);
            setTimeout(function() { toggleLayerControl.click(); }, 10);
            var isSmallScreen = window.innerWidth < 650;
            if (isSmallScreen) {
                setTimeout(function() {
                    controlLayersElement.classList.remove('leaflet-control-layers-expanded');
                    isLayersListExpanded = !isLayersListExpanded;
                }, 500);
            }  
        });       
        setBounds();

        var cdiCategories = [
            { label: 'Tidak Kumuh',  range: '0 – 0,25',   color: '#1a9641', min: 0,    max: 0.25 },
            { label: 'Ringan',       range: '0,25 – 0,5',  color: '#a6d96a', min: 0.25, max: 0.50 },
            { label: 'Sedang',       range: '0,5 – 0,65',  color: '#d4d400', min: 0.50, max: 0.65 },
            { label: 'Berat',        range: '0,65 – 0,77', color: '#fd9a48', min: 0.65, max: 0.77 },
            { label: 'Sangat Kumuh', range: '0,77 – 1',    color: '#d7191c', min: 0.77, max: 1.00 }
        ];

        /**
         * Cek apakah nilai CDI masuk ke dalam kategori tertentu.
         * Mengikuti logika range yang sama dengan style_lastyh_1_0.
         */
        function cdiInCategory(cdiVal, catIdx) {
            if (catIdx === -1) return true;
            var c = cdiCategories[catIdx];
            return cdiVal >= c.min && cdiVal <= c.max;
        }

        /**
         * Fungsi utama filter:
         *   catIdx = -1  → tampilkan semua (reset)
         *   catIdx = 0–4 → highlight kategori, redup sisanya, zoom ke extent-nya
         */
        function filterByCDI(catIdx) {
            /* --- Update tombol aktif --- */
            document.querySelectorAll('.cdi-btn').forEach(function(b) {
                b.classList.remove('active');
            });
            var activeBtn = (catIdx === -1)
                ? document.getElementById('btn-all')
                : document.getElementById('btn-' + catIdx);
            if (activeBtn) activeBtn.classList.add('active');

            /* --- Terapkan style + kumpulkan layer yang cocok untuk zoom --- */
            var matchedLayers = [];

            layer_lastyh_1.eachLayer(function(sublayer) {
                var cdiVal = sublayer.feature.properties['CDI 1'];
                var matched = cdiInCategory(cdiVal, catIdx);
                var baseStyle = style_lastyh_1_0(sublayer.feature) || {};

                if (matched) {
                    /* Kembalikan opasitas penuh */
                    baseStyle.fillOpacity = 1;
                    baseStyle.opacity     = 1;
                    baseStyle.weight      = 1.0;
                    matchedLayers.push(sublayer);
                } else {
                    /* Redup hexagon yang tidak cocok */
                    baseStyle.fillOpacity = 0.07;
                    baseStyle.opacity     = 0.15;
                    baseStyle.weight      = 0.5;
                }
                sublayer.setStyle(baseStyle);
            });

            /* --- Info banner di atas peta --- */
            var banner = document.getElementById('cdiInfoBanner');
            if (catIdx !== -1 && cdiCategories[catIdx]) {
                var cat = cdiCategories[catIdx];
                banner.style.display     = 'block';
                banner.style.borderColor = cat.color;
                banner.innerHTML =
                    '📍 <strong>' + cat.label + '</strong>'
                    + ' &nbsp;|&nbsp; CDI ' + cat.range
                    + ' &nbsp;|&nbsp; <strong>' + matchedLayers.length + '</strong> hexagon';
            } else {
                banner.style.display = 'none';
            }

            /* --- Zoom otomatis ke extent hexagon yang cocok --- */
            if (catIdx !== -1 && matchedLayers.length > 0) {
                var zoomGroup = L.featureGroup(matchedLayers);
                map.fitBounds(zoomGroup.getBounds(), { padding: [55, 55], maxZoom: 14 });
            } else if (catIdx === -1) {
                /* Reset zoom ke extent semua data */
                map.fitBounds([
                    [-6.40908651656586, 106.54663103999921],
                    [-5.992128468130886, 107.23905950948236]
                ]);
            }
        }
